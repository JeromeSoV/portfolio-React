<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
    <g>
        <circle cx="37" cy="37" r="35" stroke="royalblue" stroke-width="4" fill="white" />
        <circle cx="62" cy="62" r="35" stroke="royalblue" stroke-width="4" fill="white" />
            <circle cx="62" cy="62" r="35"  fill="darkblue"
                    onmouseover="this.style.fill='lightblue';this.style.stroke='lightblue';"
                    onmouseout="this.style.fill='darkblue';this.style.stroke='darkblue'" />

            <circle cx="37" cy="37" r="35"  fill="lightblue"
                    onmouseover="this.style.fill='darkblue';this.style.stroke='darkblue'"
                    onmouseout="this.style.fill='lightblue';this.style.stroke='lightblue'"/>

            <text x="26" y="50" fill="white" stroke="darkblue" font-size="40"
                  onmouseover="this.style.fill='darkblue';this.style.stroke='darkblue'"
                  onmouseout="this.style.fill='white';this.style.stroke='darkblue'">J</text>
            <text x="62" y="85" fill="white" stroke="darkblue" font-size="40"
                  onmouseover="this.style.fill='lightblue';this.style.stroke='lightblue'"
                  onmouseout="this.style.fill='white';this.style.stroke='lightblue'">S</text>
    </g>
</svg>